# ============================================================
# eurocrops 域内实验：900 个标注样本
#
# Backbone:
#   SSL4EO-S12 MoCo ViT-S/16
#
# 微调方式:
#   ViT 编码器冻结
#   Adapter、UNet Decoder 和分割头参与训练
# ============================================================
seed_everything: 0

trainer:
  max_epochs: 100

  accelerator: gpu
  devices: 1

  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: "eurocrops-900ID-FrozenViT"
      name: "eurocrops-900ID-SSL4EO-MoCo-ViTS16-FrozenViT"
      save_dir: "./outputs/eurocrops/PEFT"
      offline: false
      log_model: false

  check_val_every_n_epoch: 1
  log_every_n_steps: 1

  enable_checkpointing: true

  default_root_dir: "./outputs/eurocrops/PEFT/eurocrops-900ID-FrozenViT"

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_average_F1-score"
        mode: "max"
        save_top_k: 1
        save_last: true
        filename: "epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}"

model:
  class_path: trainers.ssl4eo_moco_vit_task.SSL4EOMoCoViTUNetTask

  init_args:
    checkpoint_path: "/home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth"

    image_size: 256

    selected_blocks:
      - 1
      - 4
      - 7
      - 9
      - 11

    # 冻结 SSL4EO-S12 MoCo ViT-S/16 主干。
    # 中间层 LayerNorm、Adapter、Decoder 和分割头仍然训练。
    freeze_vit: true

    in_channels: 13
    num_classes: 6

    loss: "ce"
    ignore_index: 0

    lr: 1.0e-3
    patience: 1

data:
  class_path: datamodules.sentinel2_eurocrops_explicit.Sentinel2EuroCropsExplicit

  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 8

    eurocrops_paths: "./harmonized_global_crops/eurocrops_cropped_subsampled"

    # 100ID
    sentinel2_paths: "./harmonized_global_crops/sentinel2_subsample_eurocrops_900_ood/sentinel2_eurocrops_subsampled"

    sentinel2_cache: false

    sentinel2_bands:
      - B01
      - B02
      - B03
      - B04
      - B05
      - B06
      - B07
      - B08
      - B8A
      - B09
      - B10
      - B11
      - B12