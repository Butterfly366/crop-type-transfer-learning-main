# ============================================================
# 4000 样本域外实验
#
# OOD 测试域：
#   eurocrops
#
# 训练域：
#   cdl 1000
#   NCCM 2019  1000
#   SACT 2017  1000
#   SAS 2021   1000
#
# 总训练样本：
#   4000
#
# 微调方式：
#   冻结 SSL4EO-S12 MoCo ViT-S/16 主干；
#   训练 LayerNorm、多尺度 Adapter、UNet Decoder 和分割头。
# ============================================================

seed_everything: 0

trainer:
  accelerator: gpu
  devices: 1

  max_epochs: 100
  check_val_every_n_epoch: 1
  log_every_n_steps: 20

  enable_checkpointing: true

  default_root_dir: "./outputs/eurocrops/PEFT/eurocrops-4000OOD-100ID-FrozenViT"

  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: "eurocrops-4000OOD-100ID-FrozenViT"
      name: "eurocrops-OOD-4000-100-SSL4EO-MoCo-ViTS16-FrozenViT"
      save_dir: "./outputs/eurocrops/PEFT"
      offline: false
      log_model: false

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_average_F1-score"
        mode: "max"
        save_top_k: 1
        save_last: true
        filename: "epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}"

model:
  class_path: trainers.ssl4eo_moco_vit_task.SSL4EOMoCoViTUNetTask

  init_args:
    checkpoint_path: "/home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth"

    image_size: 256

    selected_blocks:
      - 1
      - 4
      - 7
      - 9
      - 11

    # 冻结 ViT 主干。
    # LayerNorm、Adapter、Decoder 和 Segmentation Head 仍参与训练。
    freeze_vit: true

    in_channels: 13
    num_classes: 6

    loss: "ce"
    ignore_index: 0

    lr: 1.0e-3
    patience: 1

data:
  class_path: datamodules.sentinel2_global_train_explicit.Sentinel2GlobalTrainExplicit

  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 8

    # 该目录中只能包含四个训练域，不包含 CDL。
    sentinel2_paths: "./harmonized_global_crops/sentinel2_subsample_eurocrops_4000_100"

    sentinel2_cache: false

    sentinel2_bands:
      - B01
      - B02
      - B03
      - B04
      - B05
      - B06
      - B07
      - B08
      - B8A
      - B09
      - B10
      - B11
      - B12

    # 所有标签目录仍需声明。
    # Sentinel2Global 会根据现有影像与对应标签求交，
    # 因为训练影像目录中没有 CDL，所以 CDL 不会进入训练。
    cdl_paths: "./harmonized_global_crops/cdl_harmonized_block"
    cdl_years:
      - 2023

    eurocrops_paths: "./harmonized_global_crops/eurocrops_cropped_subsampled"

    nccm_paths: "./harmonized_global_crops/nccm_harmonized_block"
    nccm_years:
      - 2019

    sact_paths: "./harmonized_global_crops/sact_harmonized/train/labels"

    sas_paths: "./harmonized_global_crops/sas_harmonized"
    sas_years:
      - 2021