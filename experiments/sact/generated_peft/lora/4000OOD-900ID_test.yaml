seed_everything: 0
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: SACT-4000OOD-900ID-PEFT
      name: SACT-4000OOD-900ID-SSL4EO-MoCo-ViTS16-LoRA-r4-Test
      save_dir: ./outputs/sact/PEFT/lora
      offline: false
      log_model: false
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ./outputs/sact/PEFT/lora/4000OOD-900ID
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_average_F1-score
      mode: max
      save_top_k: 1
      save_last: true
      filename: epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}
model:
  class_path: trainers.ssl4eo_moco_vit_lora_task.SSL4EOMoCoViTUNetLoRATask
  init_args:
    checkpoint_path: /home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth
    image_size: 256
    in_channels: 13
    num_classes: 6
    loss: ce
    ignore_index: 0
    lr: 0.001
    patience: 1
    lora_rank: 4
    lora_alpha: 4.0
    lora_dropout: 0.0
    lora_blocks: null
    lora_query: true
    lora_value: true
data:
  class_path: datamodules.sentinel2_sact_explicit.Sentinel2SACTExplicit
  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 12
    sact_paths: ./harmonized_global_crops/sact_harmonized/train/labels
    sentinel2_paths: ./harmonized_global_crops/sentinel2_subsample_test/sentinel2_sact_2017_subsampled
    sentinel2_cache: false
    sentinel2_bands:
    - B01
    - B02
    - B03
    - B04
    - B05
    - B06
    - B07
    - B08
    - B8A
    - B09
    - B10
    - B11
    - B12
