seed_everything: 0
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: NCCM-900ID-PEFT
      name: NCCM-900ID-SSL4EO-MoCo-ViTS16-SLR-MAE-r16-Train
      save_dir: ./outputs/nccm/PEFT/slr
      offline: false
      log_model: false
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ./outputs/nccm/PEFT/slr/900ID/ssl_pretrain
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_loss
      mode: min
      save_top_k: 1
      save_last: true
      filename: epoch{epoch:02d}-val_loss{val_loss:.6f}
model:
  class_path: trainers.ssl4eo_moco_vit_slr_mae_task.SSL4EOMoCoViTSLRMAETask
  init_args:
    checkpoint_path: /home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth
    image_size: 256
    in_channels: 13
    patch_size: 16
    mask_ratio: 0.75
    slr_rank: 16
    slr_blocks: null
    decoder_embed_dim: 512
    decoder_depth: 8
    decoder_num_heads: 16
    norm_pix_loss: false
    lr: 0.0001
    weight_decay: 0.05
    min_lr: 0.0
    warmup_epochs: 10
data:
  class_path: datamodules.sentinel2_nccm_explicit.Sentinel2NCCMExplicit
  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 12
    nccm_paths: ./harmonized_global_crops/nccm_harmonized_block
    nccm_years:
    - 2019
    sentinel2_paths: ./harmonized_global_crops/sentinel2_subsample_nccm_2019_900_ood/sentinel2_nccm_2019_subsampled
    sentinel2_cache: false
    sentinel2_bands:
    - B01
    - B02
    - B03
    - B04
    - B05
    - B06
    - B07
    - B08
    - B8A
    - B09
    - B10
    - B11
    - B12
