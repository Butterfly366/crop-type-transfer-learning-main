# ============================================================
# 4000 样本域外实验
#
# OOD 测试域：
#   nccm
#
# 训练域：
#   cdl 1000
#   eurocrops 1000
#   SACT 2017  1000
#   SAS 2021   1000
#
# 总训练样本：
#   4000
#
# 微调方式：
#   冻结 SSL4EO-S12 MoCo ViT-S/16 主干；
#   训练 LayerNorm、多尺度 Adapter、UNet Decoder 和分割头。
# ============================================================

seed_everything: 0

trainer:
  max_epochs: 100

  accelerator: gpu
  devices: 1

  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: "nccm-4000-900-FrozenViT-test"
      name: "nccm-4000-900-SSL4EO-MoCo-ViTS16-FrozenViT-test"
      save_dir: "./outputs/nccm/PEFT"
      offline: false
      log_model: false

  check_val_every_n_epoch: 1
  log_every_n_steps: 1

  enable_checkpointing: true

  default_root_dir: "./outputs/nccm/PEFT/nccm-4000-900-FrozenViT-test"

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_average_F1-score"
        mode: "max"
        save_top_k: 1
        save_last: true
        filename: "epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}"

model:
  class_path: trainers.ssl4eo_moco_vit_task.SSL4EOMoCoViTUNetTask

  init_args:
    checkpoint_path: "/home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth"

    image_size: 256

    selected_blocks:
      - 1
      - 4
      - 7
      - 9
      - 11

    # 冻结 SSL4EO-S12 MoCo ViT-S/16 主干。
    # 中间层 LayerNorm、Adapter、Decoder 和分割头仍然训练。
    freeze_vit: true

    in_channels: 13
    num_classes: 6

    loss: "ce"
    ignore_index: 0

    lr: 1.0e-3
    patience: 1

data:
  class_path: datamodules.sentinel2_nccm_explicit.Sentinel2NCCMExplicit

  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 8

    nccm_paths: "./harmonized_global_crops/nccm_harmonized_block"

    nccm_years:
      - 2019

    # 100ID
    sentinel2_paths: "./harmonized_global_crops/sentinel2_subsample_test/sentinel2_nccm_2019_subsampled"

    sentinel2_cache: false

    sentinel2_bands:
      - B01
      - B02
      - B03
      - B04
      - B05
      - B06
      - B07
      - B08
      - B8A
      - B09
      - B10
      - B11
      - B12

