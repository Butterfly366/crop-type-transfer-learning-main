seed_everything: 0
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: CDL-10ID-PEFT
      name: CDL-10ID-SSL4EO-MoCo-ViTS16-AdaptFormer-d64-Test
      save_dir: ./outputs/cdl/PEFT/adaptformer
      offline: false
      log_model: false
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ./outputs/cdl/PEFT/adaptformer/10ID
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_average_F1-score
      mode: max
      save_top_k: 1
      save_last: true
      filename: epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}
model:
  class_path: trainers.ssl4eo_moco_vit_adaptformer_task.SSL4EOMoCoViTUNetAdaptFormerTask
  init_args:
    checkpoint_path: /home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth
    image_size: 256
    in_channels: 13
    num_classes: 6
    loss: ce
    ignore_index: 0
    lr: 0.001
    patience: 1
    adapter_bottleneck_dim: 64
    adapter_scale: 0.1
    adapter_dropout: 0.0
    adapter_learnable_scale: false
    adapter_blocks: null
data:
  class_path: datamodules.sentinel2_cdl_explicit.Sentinel2CDLExplicit
  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 12
    cdl_paths: ./harmonized_global_crops/cdl_harmonized_block
    cdl_years:
    - 2023
    sentinel2_paths: ./harmonized_global_crops/sentinel2_subsample_test/sentinel2_cdl_2023_subsampled
    sentinel2_cache: false
    sentinel2_bands:
    - B01
    - B02
    - B03
    - B04
    - B05
    - B06
    - B07
    - B08
    - B8A
    - B09
    - B10
    - B11
    - B12
