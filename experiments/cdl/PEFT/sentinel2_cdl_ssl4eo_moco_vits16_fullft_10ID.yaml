# ============================================================
# CDL 域内实验：10 个标注样本
#
# Backbone:
#   SSL4EO-S12 MoCo ViT-S/16
#
# 微调方式:
#   Full Fine-Tuning
#   ViT 编码器、Adapter、UNet Decoder 和分割头全部参与训练
# ============================================================

seed_everything: 0

trainer:
  max_epochs: 100

  accelerator: "gpu"
  devices: 1

  # 与原始实验保持一致，使用 WandB 记录结果。
  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: "CDL-10ID-FullFT"
      name: "CDL-10ID-SSL4EO-MoCo-ViTS16-FullFT"
      save_dir: "./outputs/cdl/PEFT"
      offline: false
      log_model: false

  check_val_every_n_epoch: 1
  log_every_n_steps: 1

  enable_checkpointing: true

  default_root_dir: "./outputs/cdl/PEFT/ssl4eo_moco_vits16_fullft_10ID"

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_average_F1-score"
        mode: "max"
        save_top_k: 1
        save_last: true
        filename: "epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}"

model:
  class_path: trainers.ssl4eo_moco_vit_task.SSL4EOMoCoViTUNetTask

  init_args:
    checkpoint_path: "/home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth"

    image_size: 256

    # 从 ViT 的 5 个中间层提取多尺度特征。
    selected_blocks:
      - 1
      - 4
      - 7
      - 9
      - 11

    # 全量微调：不冻结 ViT 编码器。
    freeze_vit: false

    in_channels: 13
    num_classes: 6

    loss: "ce"
    ignore_index: 0

    # 暂时与原始配置保持一致。
    lr: 1.0e-3
    patience: 1

data:
  class_path: datamodules.sentinel2_cdl_explicit.Sentinel2CDLExplicit

  init_args:
    # 原 ResNet50 配置为 128，但 ViT 全量微调显存占用明显更高。
    batch_size: 64

    patch_size: 256
    num_workers: 6

    cdl_paths: "./harmonized_global_crops/cdl_harmonized_block"
    cdl_years:
      - 2023

    sentinel2_paths: "./harmonized_global_crops/sentinel2_subsample_cdl_2023_10_ood/sentinel2_cdl_2023_subsampled"

    sentinel2_cache: false

    sentinel2_bands:
      - "B01"
      - "B02"
      - "B03"
      - "B04"
      - "B05"
      - "B06"
      - "B07"
      - "B08"
      - "B8A"
      - "B09"
      - "B10"
      - "B11"
      - "B12"