seed_everything: 0
trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  logger:
    class_path: custom_loggers.wandb_explicit.WandbLoggerExplicit
    init_args:
      project: SAS-100ID-PEFT
      name: SAS-100ID-SSL4EO-MoCo-ViTS16-VPT-Deep-p128-Test
      save_dir: ./outputs/sas/PEFT/vpt
      offline: false
      log_model: false
  check_val_every_n_epoch: 1
  log_every_n_steps: 1
  enable_checkpointing: true
  default_root_dir: ./outputs/sas/PEFT/vpt/100ID
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_average_F1-score
      mode: max
      save_top_k: 1
      save_last: true
      filename: epoch{epoch:02d}-val_f1{val_average_F1-score:.4f}
model:
  class_path: trainers.ssl4eo_moco_vit_vpt_task.SSL4EOMoCoViTUNetVPTTask
  init_args:
    checkpoint_path: /home/hzm/.cache/torch/hub/checkpoints/ssl4eo/B13_vits16_moco_0099.pth
    image_size: 256
    in_channels: 13
    num_classes: 6
    loss: ce
    ignore_index: 0
    lr: 0.001
    patience: 1
    prompt_length: 128
    vpt_type: deep
    prompt_dropout: 0.0
data:
  class_path: datamodules.sentinel2_sas_explicit.Sentinel2SASExplicit
  init_args:
    batch_size: 64
    patch_size: 256
    num_workers: 12
    south_america_soybean_paths: ./harmonized_global_crops/sas_harmonized
    south_america_soybean_years:
    - 2021
    sentinel2_paths: ./harmonized_global_crops/sentinel2_subsample_test/sentinel2_sas_2021_subsampled
    sentinel2_cache: false
    sentinel2_bands:
    - B01
    - B02
    - B03
    - B04
    - B05
    - B06
    - B07
    - B08
    - B8A
    - B09
    - B10
    - B11
    - B12
